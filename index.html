<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Picture Book ✨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }

    /* Single splash screen — always visible until AR starts */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 8vh;
      background-image: url('splashscreen.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Spinner sits at bottom while loading */
    #loading-indicator {
      position: absolute;
      bottom: 10vh;
      left: 50%;
      transform: translateX(-50%);
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(45, 90, 45, 0.25);
      border-top-color: #2d5a2d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Button invisible until ready, then fades in */
    #start-btn {
      position: relative;
      z-index: 1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: min(70vw, 300px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #start-btn.ready {
      opacity: 1;
      pointer-events: auto;
    }
    #start-btn img {
      width: 100%;
      height: auto;
      display: block;
    }
    #start-btn:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    /* Scan hint */
    #scan-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: none;
      pointer-events: none;
      width: min(72vw, 340px);
    }
    #scan-hint img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Scan frame corners */
    #scan-frame {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 400;
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 50px;
      height: 50px;
      border-color: rgba(200, 230, 192, 0.8);
      border-style: solid;
    }
    .corner-tl { top: 20%; left: 10%; border-width: 3px 0 0 3px; }
    .corner-tr { top: 20%; right: 10%; border-width: 3px 3px 0 0; }
    .corner-bl { bottom: 20%; left: 10%; border-width: 0 0 3px 3px; }
    .corner-br { bottom: 20%; right: 10%; border-width: 0 3px 3px 0; }

    /* Sound button */
    #sound-btn {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 20px;
      z-index: 600;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 64px;
      height: 64px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    #sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #sound-btn:active {
      transform: scale(0.9);
      opacity: 0.8;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- Splash screen: illustration as background, button fades in when ready -->
  <div id="splash-screen">
    <button id="start-btn" aria-label="Let's Begin">
      <img src="let_s-begin.png" alt="Let's Begin" />
    </button>
    <div id="loading-indicator">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Scan hint -->
  <div id="scan-hint"><img src="pointcamera.png" alt="Point camera at the book page" /></div>

  <!-- Sound toggle -->
  <button id="sound-btn" aria-label="Toggle sound">
    <img id="sound-icon" src="sound-off.png" alt="Sound off" />
  </button>

  <!-- Scan frame corners -->
  <div id="scan-frame">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>

  <!-- AR Scene -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.05; filterBeta: 50; warmupTolerance: 5; missTolerance: 10;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="ar-video"
        src="animation.mp4"
        preload="auto"
        playsinline
        webkit-playsinline
        loop
        crossorigin="anonymous"
      ></video>
      <audio id="ambient-audio" src="ambient.mp3" preload="auto" loop></audio>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video
        src="#ar-video"
        position="0 0 0.001"
        width="1"
        height="0.8"
        rotation="0 0 0"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const splashScreen  = document.getElementById('splash-screen');
    const startBtn      = document.getElementById('start-btn');
    const loadingInd    = document.getElementById('loading-indicator');
    const scanHint      = document.getElementById('scan-hint');
    const scanFrame     = document.getElementById('scan-frame');
    const arScene       = document.getElementById('ar-scene');
    const arVideo       = document.getElementById('ar-video');
    const ambientAudio  = document.getElementById('ambient-audio');
    const soundBtn      = document.getElementById('sound-btn');
    const soundIcon     = document.getElementById('sound-icon');

    function onReady() {
      // Hide spinner, fade in button
      loadingInd.style.display = 'none';
      startBtn.classList.add('ready');
    }

    arScene.addEventListener('loaded', onReady);
    setTimeout(() => {
      if (!startBtn.classList.contains('ready')) onReady();
    }, 5000);

    startBtn.addEventListener('click', () => {
      splashScreen.style.display = 'none';
      scanHint.style.display     = 'block';
      scanFrame.style.display    = 'flex';
      try {
        arScene.systems['mindar-image-system'].start();
      } catch(e) {
        console.error('AR start error:', e);
      }
    });

    let soundEnabled = false;

    soundBtn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        ambientAudio.play().catch(() => {});
        soundIcon.src = 'sound-on.png';
        soundIcon.alt = 'Sound on';
      } else {
        ambientAudio.pause();
        soundIcon.src = 'sound-off.png';
        soundIcon.alt = 'Sound off';
      }
    });

    arScene.addEventListener('targetFound', () => {
      scanHint.style.display  = 'none';
      scanFrame.style.display = 'none';
      soundBtn.style.display  = 'block';
      arVideo.play().catch(() => {});
      if (soundEnabled) ambientAudio.play().catch(() => {});
    });

    arScene.addEventListener('targetLost', () => {
      scanHint.style.display  = 'block';
      scanFrame.style.display = 'flex';
      arVideo.pause();
      ambientAudio.pause();
    });
  </script>
</body>
</html>
