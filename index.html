<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AR Picture Book ✨</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }

/* Splash screen */
#splash-screen {
position: fixed;
inset: 0;
z-index: 9999;
overflow: hidden;
}

/* FIXED FULL-SCREEN IMAGE */
#splash-bg {
position: fixed;
inset: 0;
width: 100vw;
height: 100vh;
object-fit: cover;
object-position: center;
z-index: 0;
}

/* Button + spinner stay above image */
#start-btn, #loading-indicator {
position: relative;
z-index: 2;
}

#loading-indicator {
position: absolute;
bottom: 10vh;
left: 50%;
transform: translateX(-50%);
}

.spinner {
width: 44px;
height: 44px;
border: 4px solid rgba(45, 90, 45, 0.25);
border-top-color: #2d5a2d;
border-radius: 50%;
animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#start-btn {
position: relative;
background: none;
border: none;
cursor: pointer;
width: min(70vw, 300px);
opacity: 0;
pointer-events: none;
transition: opacity 0.6s ease;
}

#start-btn.ready {
opacity: 1;
pointer-events: auto;
}

#start-btn img {
width: 100%;
display: block;
}

#start-btn:active {
transform: scale(0.96);
opacity: 0.85;
}

/* Scan hint */
#scan-hint {
position: fixed;
bottom: 40px;
left: 50%;
transform: translateX(-50%);
z-index: 500;
display: none;
pointer-events: none;
width: min(72vw, 340px);
}

#scan-hint img {
width: 100%;
}

/* Scan frame */
#scan-frame {
position: fixed;
inset: 0;
display: none;
align-items: center;
justify-content: center;
z-index: 400;
pointer-events: none;
}

.corner {
position: absolute;
width: 50px;
height: 50px;
border-color: rgba(200, 230, 192, 0.8);
border-style: solid;
}

.corner-tl { top: 20%; left: 10%; border-width: 3px 0 0 3px; }
.corner-tr { top: 20%; right: 10%; border-width: 3px 3px 0 0; }
.corner-bl { bottom: 20%; left: 10%; border-width: 0 0 3px 3px; }
.corner-br { bottom: 20%; right: 10%; border-width: 0 3px 3px 0; }

/* Sound button */
#sound-btn {
display: none;
position: fixed;
bottom: 28px;
right: 20px;
z-index: 600;
background: none;
border: none;
cursor: pointer;
width: 64px;
height: 64px;
}

#sound-btn img {
width: 100%;
height: 100%;
object-fit: contain;
}

a-scene {
position: fixed;
inset: 0;
width: 100%;
height: 100%;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<div id="splash-screen">
<img id="splash-bg" src="splashscreen.png" alt="Splash screen" />

<button id="start-btn">
<img src="let_s-begin.png" alt="Let's Begin" />
</button>

<div id="loading-indicator">
<div class="spinner"></div>
</div>
</div>

<div id="scan-hint">
<img src="pointcamera.png" />
</div>

<button id="sound-btn">
<img id="sound-icon" src="sound-off.png" />
</button>

<div id="scan-frame">
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
</div>

<a-scene
id="ar-scene"
mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
vr-mode-ui="enabled: false"
>
<a-assets>
<video id="ar-video" src="animation.mp4" loop playsinline></video>
<audio id="ambient-audio" src="ambient.mp3" loop></audio>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">
<a-video src="#ar-video" width="1" height="0.8"></a-video>
</a-entity>
</a-scene>

<script>
const splashScreen = document.getElementById('splash-screen');
const startBtn = document.getElementById('start-btn');
const loadingInd = document.getElementById('loading-indicator');
const arScene = document.getElementById('ar-scene');

function onReady() {
loadingInd.style.display = 'none';
startBtn.classList.add('ready');
}

arScene.addEventListener('loaded', onReady);

startBtn.addEventListener('click', () => {
splashScreen.style.display = 'none';
arScene.systems['mindar-image-system'].start();
});
</script>

</body>
</html>
